version: '3'
services:
    # PHP Service (админка Spectrum)
    spectrum_php:
        container_name: spectrum_php
        build:
            context: .
            dockerfile: Dockerfile
        restart: unless-stopped
        tty: true
        working_dir: /var/www
        volumes:
            - ./:/var/www
            - ./.env:/var/www/.env
            - ./php/local.ini:/usr/local/etc/php/conf.d/local.ini
        networks:
            - shared-media-network
    # Nginx Service (для админки)
    spectrum_webserver:
        container_name: spectrum_webserver
        image: nginx:alpine
        restart: unless-stopped
        tty: true
        ports:
            - "80:80"
        volumes:
            - ./:/var/www
            - ./nginx/conf.d/:/etc/nginx/conf.d/
        networks:
            - shared-media-network
    # MySQL Service
    spectrum_db:
        container_name: spectrum_db
        image: mysql:5.7.22
        restart: unless-stopped
        tty: true
        ports:
            - "3306:3306"
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_USER: ${DB_USERNAME}
            SERVICE_TAGS: dev
            SERVICE_NAME: mysql
        volumes:
            - dbdata:/var/lib/mysql/
            - ./mysql/my.cnf:/etc/mysql/my.cnf
        networks:
            - shared-media-network
    # Redis Service
    spectrum_redis:
        container_name: spectrum_redis
        image: redis:latest
        ports:
            - "6379:6379"
        volumes:
            - ./redisdata:/data
        command: ["redis-server", "--bind", "spectrum_redis", "--port", "6379","--stop-writes-on-bgsave-error", "no"]
        networks:
            - shared-media-network
    # Adminer client
    spectrum_adminer:
        container_name: spectrum_adminer
        restart: unless-stopped
        image: adminer:4
        environment:
            ADMINER_DEFAULT_DB_DRIVER: mysql
            # Меняем 'db' на реальное имя сервиса 'spectrum_db'
            ADMINER_DEFAULT_DB_HOST: spectrum_db
            ADMINER_DEFAULT_DB_NAME: ${DB_DATABASE} # Лучше брать из env, а не хардкодить
        depends_on:
            - spectrum_db
        ports:
            - "${ADMINER_PORT:-8080}:8080"
        networks:
            - shared-media-network
    # Composer
    spectrum_composer:
        container_name: spectrum_composer
        image: composer:latest
        tty: true
        volumes:
            - ./:/var/www
        working_dir: /var/www
        depends_on:
            - spectrum_php
        networks:
            - shared-media-network
    # NPM
    spectrum_npm:
        container_name: spectrum_npm
        build:
            context: .
            dockerfile: Dockerfile.node
        tty: true
        ports:
            - "5173:5173"
        volumes:
            - ./:/var/www
        working_dir: /var/www
        command: ["npm", "run", "dev", "--", "--host"]
        networks:
            - shared-media-network
    # SOCKET
    spectrum_socket:
        container_name: spectrum_socket
        build:
            context: .
            dockerfile: Dockerfile.node
        tty: true
        volumes:
            - ./:/var/www
            - /var/www/node_modules
        working_dir: /var/www
        command: [ "node", "server.js" ]
        networks:
            - shared-media-network
        depends_on:
            - spectrum_redis
            - spectrum_db
    #PLAYWRIGHT PARSER
    spectrum_playwright_parser:
        build:
            context: .
            dockerfile: Dockerfile.parser
        container_name: spectrum_playwright_parser
        restart: unless-stopped
        shm_size: 2gb
        cap_add:
            - SYS_ADMIN
        user: pwuser
        ipc: host
        volumes:
            - ./playwright-parser.js:/app/playwright-parser.js
        networks:
            - shared-media-network
    # BROWSERLESS CHROME
    spectrum_chromium:
        container_name: spectrum_chromium
        image: browserless/chrome:latest
        restart: unless-stopped
        cap_add:
            - SYS_ADMIN
        security_opt:
            - seccomp:unconfined
        shm_size: 2g
        environment:
            - ENABLE_DEBUGGER=false
            - MAX_CONCURRENT_SESSIONS=10
            - PREBOOT_CHROME=true
            - CONNECTION_TIMEOUT=-1
        networks:
            - shared-media-network
        healthcheck:
            test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3000/json/version" ]
            interval: 30s
            timeout: 10s
            retries: 3
    # BRIDGE API
    spectrum_chromium_bridge:
        build:
            context: .
            dockerfile: Dockerfile.chromium_bridge
        container_name: spectrum_chromium_bridge
        restart: unless-stopped
        ports:
            - "9224:3002"
        environment:
            - BROWSERLESS_WS_URL=ws://spectrum_chromium:3000
            - MAX_CONCURRENCY=5
            - REQUEST_TIMEOUT=25000
        depends_on:
            - spectrum_chromium
        networks:
            - shared-media-network
networks:
    shared-media-network:
        external: true
volumes:
    dbdata:
        driver: local

